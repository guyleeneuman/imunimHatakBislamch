<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("Ak1OHw83c5xwHhhHd");
</script>
<script>
function goToMenu() {
    window.location.href = "menu.html";
}

/* =========================
   SUBMIT + EMAILJS + POPUP
========================= */
document.getElementById("contactForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const name = this.user_name.value.trim();
    const phone = this.phone_number.value.trim();
    const job = this.job.value.trim();
    const solider = this.solider_number.value.trim();
    const place = this.place.value.trim();
    const unit = document.getElementById("unitInput").value.trim();
    const details = this.details.value.trim();
    const notes = this.notes.value.trim();
    const date = dateInput.value === "תאריך" ? "" : dateInput.value;
    const time = timeInput.value === "שעה" ? "" : timeInput.value;
    // ✅ בדיקה שכל השדות מלאים
  if (!name || !phone || !job || !solider || !place || !unit || !details || !date || !time) {
    alert("יש למלא את כל השדות לפני שליחה");
    return;
}

const data = {
    user_name: name,
    phone_number: phone,
    job: job,
    solider_number: solider,
    place: place,
    unit: unit,
    details: details,
    notes: notes,
    date: date,
    time: time,
    title: "מרגמות"
};
    console.log("DATA:", data);

Promise.all([
    // emailjs.send("service_f45cdvz", "template_a18xspk", data),//גיאלי
    emailjs.send("service_44vmdgo", "template_6kkbuqs", data),//רון שוורץ
    emailjs.send("service_fdgn3qm", "template_6kkbuqs", data),//נטע שצברג
    // emailjs.send("service_70fy57c", "template_6kkbuqs", data),//רז אלוני
    emailjs.send("service_rdssy59", "template_6kkbuqs", data),//אורי שירוני
    emailjs.send("service_tzqwram", "template_6kkbuqs", data),//כללי חתק
])
.then(() => {
    console.log("EMAIL SENT TO BOTH");

    showPopup();

    this.reset();
    document.getElementById("selectedUnit").innerText = "בחר חטיבה";
    document.getElementById("unitInput").value = "";
})
.catch((err) => {
    console.log("ERROR FULL:", err);
    alert("שגיאה בשליחה");
});
});
function showPopup() {
    const overlay = document.getElementById("overlay");
    const popup = document.getElementById("successPopup");

    overlay.style.display = "block";
    popup.style.display = "block";

    setTimeout(() => {
        overlay.style.display = "none";
        popup.style.display = "none";
    }, 3000);
}

/* =========================
   DROPDOWN
========================= */

const selected = document.getElementById("selectedUnit");
const list = document.getElementById("unitList");
const hiddenInput = document.getElementById("unitInput");
const dropdown = document.querySelector(".dropdown");

// פתיחה / סגירה
selected.addEventListener("click", (e) => {
    e.stopPropagation();
    list.style.display = list.style.display === "block" ? "none" : "block";
});

// בחירה
document.querySelectorAll(".dropdownItem").forEach(item => {
    item.addEventListener("click", () => {
        const value = item.getAttribute("data-value");
        const img = item.querySelector("img");

        hiddenInput.value = value;

        if (img) {
            selected.innerHTML = `
                <img src="${img.src}" style="width:25px;height:25px;border-radius:6px;vertical-align:middle;margin-left:6px;">
                ${value}
            `;
        } else {
            selected.innerHTML = value;
        }

        list.style.display = "none";
    });
});

// סגירה בלחיצה מחוץ
document.addEventListener("click", (e) => {
    if (!dropdown.contains(e.target)) {
        list.style.display = "none";
    }
});

const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");

// ===== DATE =====
dateInput.addEventListener("focus", function () {
    if (this.value === "תאריך") {
        this.value = "";
        this.type = "date";
    }
});

dateInput.addEventListener("blur", function () {
    if (this.value === "") {
        this.type = "text";
        this.value = "תאריך";
    }
});

// ===== TIME =====
timeInput.addEventListener("focus", function () {
    if (this.value === "שעה") {
        this.value = "";
        this.type = "time";
    }
});

timeInput.addEventListener("blur", function () {
    if (this.value === "") {
        this.type = "text";
        this.value = "שעה";
    }
});
</script>
